<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - 𝔐𝔯.𝔎𝔦𝔫𝔤</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    /* Animated Gradient Background */
    body {
      background: linear-gradient(-45deg, #050508, #11051e, #0a0e29, #000000);
      background-size: 400% 400%;
      animation: gradientBG 10s ease infinite;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Animated Glowing Login Card */
    .login-card {
      background: rgba(18, 18, 26, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(168, 85, 247, 0.4);
      border-radius: 16px;
      padding: 35px 30px;
      width: 90%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 0 25px rgba(168, 85, 247, 0.25);
      animation: pulseGlow 4s infinite alternate, floatCard 3s ease-in-out infinite alternate;
    }

    @keyframes pulseGlow {
      0% { box-shadow: 0 0 15px rgba(168, 85, 247, 0.2); border-color: rgba(168, 85, 247, 0.4); }
      100% { box-shadow: 0 0 35px rgba(208, 0, 255, 0.6); border-color: rgba(208, 0, 255, 0.8); }
    }

    @keyframes floatCard {
      0% { transform: translateY(0px); }
      100% { transform: translateY(-8px); }
    }

    /* Glowing Animated Title */
    .login-card h2 {
      font-size: 28px;
      background: linear-gradient(90deg, #a855f7, #d000ff, #3b82f6, #a855f7);
      background-size: 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: textGlow 5s linear infinite;
      margin-bottom: 25px;
    }

    @keyframes textGlow {
      0% { background-position: 0%; }
      100% { background-position: 300%; }
    }

    .input-group {
      margin-bottom: 18px;
      text-align: left;
    }
    .input-group label {
      display: block;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 6px;
    }
    .input-group input {
      width: 100%;
      padding: 12px;
      background: rgba(8, 8, 12, 0.8);
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: all 0.3s;
    }
    .input-group input:focus {
      border-color: #a855f7;
      box-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
    }

    /* Animated Button */
    .btn-login {
      width: 100%;
      background: linear-gradient(45deg, #7000ff, #d000ff);
      background-size: 200% 200%;
      border: none;
      color: white;
      padding: 12px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      transition: all 0.3s ease;
    }
    .btn-login:hover {
      background-position: right center;
      box-shadow: 0 0 20px #d000ff;
      transform: scale(1.02);
    }
    .btn-login:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>

  <div class="login-card">
    <h2>𝔐𝔯.𝔎𝔦𝔫𝔤</h2>
    <form action="/login" method="POST">
      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter username" required>
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn-login">Login</button>
    </form>
  </div>

</body>
</html>
